services:
  # Banco do Auth Service
  db-auth:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${AUTH_DB_NAME:-auth_db}
    ports:
      - "3308:3306"
    volumes:
      - auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 10s
      retries: 5

  # Banco do Academic Service
  db-academic:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${ACADEMIC_DB_NAME:-academic_db}
    ports:
      - "3307:3306"
    volumes:
      - academic_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: DockerFile
    ports:
      - "8001:8000"
    environment:
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@db-auth:3306/${AUTH_DB_NAME:-auth_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-60}
    depends_on:
      db-auth:
        condition: service_healthy

  academic-service:
    build:
      context: ../services/academic-service
      dockerfile: DockerFile
    ports:
      - "8002:8000"
    environment:
      - DB_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@db-academic:3306/${ACADEMIC_DB_NAME:-academic_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
    depends_on:
      db-academic:
        condition: service_healthy

  gateway-service:
    build:
      context: ../services/gateway-service
      dockerfile: DockerFile
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8000}
      - ACADEMIC_SERVICE_URL=${ACADEMIC_SERVICE_URL:-http://academic-service:8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - auth-service
      - academic-service

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - auth-service
      - academic-service

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  observability-home:
    image: nginx:1.27-alpine
    ports:
      - "3100:80"
    volumes:
      - ./observability-home/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - grafana
      - prometheus
      - loki

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

volumes:
  auth_data:
  academic_data:

  loki_data:
  grafana_data:
