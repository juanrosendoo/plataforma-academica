global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:8000

  - job_name: academic-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - academic-service:8000

  - job_name: gateway-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway-service:8000
