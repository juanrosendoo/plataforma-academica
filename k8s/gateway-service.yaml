apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: plataforma-academica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/OWNER/REPOSITORY/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: AUTH_SERVICE_URL
            - name: ACADEMIC_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: ACADEMIC_SERVICE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: LOG_LEVEL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: plataforma-academica
spec:
  type: NodePort
  selector:
    app: gateway-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
