apiVersion: apps/v1
kind: Deployment
metadata:
  name: academic-service
  namespace: plataforma-academica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: academic-service
  template:
    metadata:
      labels:
        app: academic-service
    spec:
      containers:
        - name: academic-service
          image: ghcr.io/OWNER/REPOSITORY/academic-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plataforma-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: ACADEMIC_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: ACADEMIC_DB_NAME
            - name: DB_URL
              value: mysql+pymysql://root:$(MYSQL_ROOT_PASSWORD)@db-academic:3306/$(ACADEMIC_DB_NAME)
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plataforma-secrets
                  key: JWT_SECRET_KEY
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: JWT_ALGORITHM
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: academic-service
  namespace: plataforma-academica
spec:
  selector:
    app: academic-service
  ports:
    - port: 8000
      targetPort: 8000
