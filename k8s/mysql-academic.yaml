apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: academic-mysql-data
  namespace: plataforma-academica
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-academic
  namespace: plataforma-academica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-academic
  template:
    metadata:
      labels:
        app: db-academic
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: plataforma-config
                  key: ACADEMIC_DB_NAME
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plataforma-secrets
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: academic-mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: academic-mysql-data
          persistentVolumeClaim:
            claimName: academic-mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: db-academic
  namespace: plataforma-academica
spec:
  selector:
    app: db-academic
  ports:
    - port: 3306
      targetPort: 3306
