apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: plataforma-academica
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: auth-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - auth-service:8000

      - job_name: academic-service
        metrics_path: /metrics
        static_configs:
          - targets:
              - academic-service:8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: plataforma-academica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.0.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: plataforma-academica
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
