services:
  # Banco de Dados
  db-academico:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Microsserviço de Autenticação
  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: DockerFile  
    ports:
      - "8001:8000"
    environment:
      - DB_URL=${DB_URL}
    depends_on:
      - db-academico

  # Microsserviço Acadêmico
  academic-service:
    build:
      context: ../services/academic-service
      dockerfile: DockerFile  
    ports:
      - "8002:8000"
    environment:
      - DB_URL=${DB_URL}
    depends_on:
      - db-academico

volumes:
  db_data: