services:
  # Banco do Auth Service
  db-auth:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3308:3306"
    volumes:
      - auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 5

  # Banco do Academic Service
  db-academic:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: academic_db
    ports:
      - "3307:3306"
    volumes:
      - academic_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: DockerFile
    ports:
      - "8001:8000"
    environment:
      - DB_URL=mysql+pymysql://root:root@db-auth:3306/auth_db
    depends_on:
      db-auth:
        condition: service_healthy

  academic-service:
    build:
      context: ../services/academic-service
      dockerfile: DockerFile
    ports:
      - "8002:8000"
    environment:
      - DB_URL=mysql+pymysql://root:root@db-academic:3306/academic_db
    depends_on:
      db-academic:
        condition: service_healthy

volumes:
  auth_data:
  academic_data: