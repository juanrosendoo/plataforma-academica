name: Container Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            context: Backend/services/auth-service
          - name: academic-service
            context: Backend/services/academic-service
          - name: gateway-service
            context: Backend/services/gateway-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          VERSION="v$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REPO="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/DockerFile
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.image_repo }}/${{ matrix.service.name }}:${{ steps.version.outputs.version }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.version.outputs.image_repo }}/${{ matrix.service.name }}:${{ steps.version.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/DockerFile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.image_repo }}/${{ matrix.service.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.image_repo }}/${{ matrix.service.name }}:sha-${{ steps.version.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.image_repo }}/${{ matrix.service.name }}:latest

  tag-release:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: echo "version=v$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
