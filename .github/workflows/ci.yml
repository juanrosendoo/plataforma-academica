name: Continuous Integration (CI)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend quality tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff pip-audit

    - name: Lint backend services
      run: |
        ruff check Backend/services/auth-service Backend/services/academic-service Backend/services/gateway-service

    - name: Install Auth Service dependencies
      run: |
        cd Backend/services/auth-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Auth Service
      run: |
        cd Backend/services/auth-service
        python -m pytest

    - name: Install Academic Service dependencies
      run: |
        cd Backend/services/academic-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Academic Service
      run: |
        cd Backend/services/academic-service
        python -m pytest

    - name: Install Gateway Service dependencies
      run: |
        cd Backend/services/gateway-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Gateway Service
      run: |
        cd Backend/services/gateway-service
        python -m pytest

    - name: Audit Python dependencies
      run: |
        mkdir -p .pip-audit-cache
        pip-audit -r Backend/services/auth-service/requirements.txt --strict --no-deps --disable-pip --cache-dir .pip-audit-cache
        pip-audit -r Backend/services/academic-service/requirements.txt --strict --no-deps --disable-pip --cache-dir .pip-audit-cache
        pip-audit -r Backend/services/gateway-service/requirements.txt --strict --no-deps --disable-pip --cache-dir .pip-audit-cache

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: Frontend/package-lock.json

    - name: Install Frontend dependencies
      run: npm ci
      working-directory: Frontend

    - name: Lint Frontend
      run: npm run lint
      working-directory: Frontend

    - name: Audit Frontend dependencies
      run: npm audit --audit-level=high
      working-directory: Frontend

    - name: Build Frontend
      run: npm run build
      working-directory: Frontend

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: fs
        scan-ref: .
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: '1'
