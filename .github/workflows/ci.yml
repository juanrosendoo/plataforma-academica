name: Continuous Integration (CI)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Auth Service dependencies
      run: |
        cd Backend/services/auth-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Auth Service
      run: |
        cd Backend/services/auth-service
        python -m pytest

    - name: Install Academic Service dependencies
      run: |
        cd Backend/services/academic-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Academic Service
      run: |
        cd Backend/services/academic-service
        python -m pytest

    - name: Install Gateway Service dependencies
      run: |
        cd Backend/services/gateway-service
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test Gateway Service
      run: |
        cd Backend/services/gateway-service
        python -m pytest

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: Frontend/package-lock.json

    - name: Install Frontend dependencies
      run: npm ci
      working-directory: Frontend

    - name: Build Frontend
      run: npm run build
      working-directory: Frontend
